name: code
description: "GrindChat - Professional Real-Time App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Styling
  google_fonts: ^6.2.1
  font_awesome_flutter: ^10.7.0
  cupertino_icons: ^1.0.8

  # Backend & Auth
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.0.1
  email_otp: ^2.1.0
  
  # Media & Storage
  image_picker: ^1.1.2
  video_player: ^2.8.1
  http: ^1.2.1
  
  # Logic & Data
  intl: ^0.19.0
  connectivity_plus: ^6.0.3
  shared_preferences: ^2.3.2
  permission_handler: ^11.3.1

  # Calling Engine (Applied the terminal's recommendation)
  zego_uikit_prebuilt_call: ^4.17.13

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true