<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>GrindChat Secure Call</title>
    <!-- Load the Jitsi External API -->
    <script src='https://meet.jit.si/external_api.js'></script>
    <style>
        body, html, #meet { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; overflow: hidden; }
    </style>
</head>
<body>
    <div id="meet"></div>
    <script>
        // Extract parameters from the URL
        const urlParams = new URLSearchParams(window.location.search);
        const roomName = urlParams.get('room');
        const userDispName = urlParams.get('name');

        const domain = 'meet.jit.si';
        const options = {
            roomName: roomName,
            width: '100%',
            height: '100%',
            parentNode: document.querySelector('#meet'),
            userInfo: { displayName: userDispName },
            configOverwrite: {
                prejoinPageEnabled: false,    // THE FAIL-PROOF FIX
                disableDeepLinking: true,     // Stops mobile app redirects
                startWithAudioMuted: false,
                startWithVideoMuted: false,
                enableWelcomePage: false,
                enableClosePage: false        // Prevents the "Thank you" ad screen
            },
            interfaceConfigOverwrite: {
                TOOLBAR_BUTTONS: [
                    'microphone', 'camera', 'closedcaptions', 'desktop', 'fullscreen',
                    'fodeviceselection', 'hangup', 'profile', 'chat', 'recording',
                    'livestreaming', 'etherpad', 'sharedvideo', 'settings', 'raisehand',
                    'videoquality', 'filmstrip', 'invite', 'feedback', 'stats', 'shortcuts',
                    'tileview', 'videobackgroundblur', 'download', 'help', 'mute-everyone',
                    'security'
                ],
            }
        };
        const api = new JitsiMeetExternalAPI(domain, options);

        // When the user hangs up, close the tab automatically
        api.addEventListener('videoConferenceLeft', () => {
            window.close();
        });
    </script>
</body>
</html>
